{% extends "base.html" %}
{% block content %}
<div style="margin-bottom:12px;"><a href="/reports" style="font-size:13px;color:var(--secondary);">← Reportes</a></div>
<div style="margin-bottom:16px;"><div class="page-title">{{ title }}</div><div class="page-subtitle">Total: {{ total_label }}</div></div>

<div style="display:inline-flex;background:var(--trackBg);border-radius:11px;padding:3px;margin-bottom:18px;">
  <a href="/reports/top-categories?type=expense" class="tab-pill {{ 'active' if type == 'expense' else '' }}">Gastos</a>
  <a href="/reports/top-categories?type=income" class="tab-pill {{ 'active' if type == 'income' else '' }}">Ingresos</a>
</div>

<div class="card">
  {% if segs %}
  <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap;">
    <svg viewBox="0 0 180 180" width="150" height="150" style="flex-shrink:0;">
      <circle cx="90" cy="90" r="60" fill="none" stroke="var(--trackBg)" stroke-width="24"></circle>
      {% for s in segs %}
      <circle cx="90" cy="90" r="60" fill="none" stroke="{{ s.color }}" stroke-width="24" stroke-dasharray="{{ s.dash }}" stroke-dashoffset="{{ s.offset }}" transform="rotate(-90 90 90)"></circle>
      {% endfor %}
    </svg>
    <div style="flex:1;min-width:200px;display:flex;flex-direction:column;gap:10px;">
      {% for r in rows %}
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:12.5px;margin-bottom:4px;">
          <span style="display:flex;align-items:center;gap:7px;"><span style="width:9px;height:9px;border-radius:50%;background:{{ r.color }};"></span>{{ r.name }}</span>
          <span class="mono" style="color:var(--secondary);">{{ r.amount }} · {{ r.pct }}%</span>
        </div>
        <div class="track-bar thin"><div class="track-fill" style="width:{{ r.pct }}%;background:{{ r.color }};"></div></div>
      </div>
      {% endfor %}
    </div>
  </div>
  {% else %}
  <div class="empty-note">No hay datos para este tipo.</div>
  {% endif %}
</div>
{% endblock %}
