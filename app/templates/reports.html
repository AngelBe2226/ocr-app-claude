{% extends "base.html" %}
{% block content %}
<div style="margin-bottom:18px;"><div class="page-title">Reportes</div><div class="page-subtitle">Analiza tu dinero desde distintos ángulos</div></div>

<div class="grid-auto" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr));">
  {% for c in cards %}
  <a href="/reports/{{ c.id }}" class="card card-pad-18" style="display:flex;align-items:center;gap:12px;">
    <span style="width:40px;height:40px;border-radius:12px;background:var(--trackBg);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;">{{ c.icon }}</span>
    <div style="min-width:0;">
      <div style="font-size:14px;font-weight:700;">{{ c.title }}</div>
      <div style="font-size:11.5px;color:var(--secondary);margin-top:2px;">{{ c.subtitle }}</div>
    </div>
  </a>
  {% endfor %}
</div>
{% endblock %}
