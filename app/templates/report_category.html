{% extends "base.html" %}
{% block content %}
<div style="margin-bottom:12px;"><a href="/reports" style="font-size:13px;color:var(--secondary);">← Reportes</a></div>
<div style="margin-bottom:14px;"><div class="page-title">{{ title }}</div></div>

<form method="get" action="/reports/category" style="margin-bottom:16px;max-width:320px;">
  <select name="name" class="input" onchange="this.form.submit()">
    {% for c in categories %}<option value="{{ c }}" {{ 'selected' if c == selected else '' }}>{{ c }}</option>{% endfor %}
  </select>
</form>

<div class="grid-auto" style="margin-bottom:16px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));">
  {% for k in kpis %}
  <div class="card card-pad-18"><div style="font-size:12px;color:var(--secondary);margin-bottom:8px;">{{ k.label }}</div><div class="mono" style="font-size:19px;font-weight:700;color:{{ k.color }};">{{ k.value }}</div></div>
  {% endfor %}
</div>

<div class="card">
  <div style="font-size:13px;font-weight:700;margin-bottom:8px;">{{ selected }} · últimos 12 meses</div>
  <svg viewBox="0 0 600 165" style="width:100%;height:180px;overflow:visible;">
    <polygon points="{{ chart.points }} 580,135 20,135" fill="{{ line_color }}" opacity="0.12"></polygon>
    <polyline points="{{ chart.points }}" fill="none" stroke="{{ line_color }}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
    {% for d in chart.dots %}
    <circle cx="{{ d.x }}" cy="{{ d.y }}" r="3.5" fill="{{ line_color }}"></circle>
    <text x="{{ d.x }}" y="158" font-size="10" text-anchor="middle" fill="var(--secondary)">{{ d.label }}</text>
    {% endfor %}
  </svg>
</div>
{% endblock %}
