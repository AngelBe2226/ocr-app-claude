<div id="edit-modal" class="modal-backdrop" style="display:none;" onclick="if(event.target===this)closeEditModal()">
  <div class="modal-card">
    <div class="modal-head">
      <div style="font-size:15px;font-weight:800;">Editar movimiento</div>
      <button type="button" class="modal-close" onclick="closeEditModal()">&times;</button>
    </div>
    <form id="form-edit" method="post" class="form-col">
      <div class="grid-2">
        <select name="type" class="input js-etype">
          <option value="expense">Gasto</option>
          <option value="income">Ingreso</option>
        </select>
        <select name="profile" class="input js-eprofile"></select>
      </div>
      <select name="category" class="input js-ecategory"></select>
      <select name="subcategory" class="input js-esubcategory"><option value="">Subcategoría (opcional)</option></select>
      <input type="text" name="store" class="input js-estore" placeholder="🏪 Tienda / comercio (opcional)" list="store-list">
      <select name="account_id" class="input js-eaccount"></select>
      <input type="number" step="0.01" min="0" name="amount" placeholder="Importe (€)" class="input mono js-eamount" required>
      <input type="date" name="date" class="input mono js-edate" required>
      <div style="display:flex;gap:8px;">
        <select name="quantity" class="input js-equantity" style="max-width:82px;" title="Cantidad">
          <option value="-">–</option>
          <option>1x</option><option>2x</option><option>3x</option><option>4x</option><option>5x</option>
          <option>6x</option><option>7x</option><option>8x</option><option>9x</option><option>10x</option>
        </select>
        <input type="text" name="note" placeholder="Nota" class="input js-enote" style="flex:1;" list="note-list" autocomplete="off">
      </div>
      <button type="submit" class="btn">Guardar cambios</button>
    </form>
  </div>
</div>
