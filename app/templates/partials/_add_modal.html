<div id="add-modal" class="modal-backdrop" style="display:none;" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-card">
    <div class="modal-head">
      <div class="seg-tabs">
        <button type="button" class="seg active" data-tab="expense" onclick="switchAddTab('expense')">Gasto</button>
        <button type="button" class="seg" data-tab="income" onclick="switchAddTab('income')">Ingreso</button>
        <button type="button" class="seg" data-tab="transfer" onclick="switchAddTab('transfer')">Transferencia</button>
      </div>
      <button type="button" class="modal-close" onclick="closeAddModal()">&times;</button>
    </div>

    <!-- Gasto -->
    <form id="form-expense" class="add-form form-col" method="post" action="/add/expense" enctype="multipart/form-data">
      <select name="profile" class="input js-profile" data-kind="expense" required></select>
      <div class="cascade" data-kind="expense">
        <input type="hidden" name="category" data-role="category">
        <input type="hidden" name="subcategory" data-role="subcategory">
        <button type="button" class="input cascade-trigger" onclick="toggleCascade(this)">
          <span class="cascade-label" style="color:var(--muted);">Selecciona categoría</span><span class="cascade-caret">▾</span>
        </button>
        <div class="cascade-panel" style="display:none;"></div>
      </div>
      <input type="text" name="store" class="input js-store" placeholder="🏪 Tienda / comercio (opcional)" list="store-list">
      <select name="account_id" class="input js-account" required></select>
      <input type="number" step="0.01" min="0" name="amount" placeholder="Importe (€)" class="input mono" required>
      <input type="date" name="date" class="input mono js-today" required>
      <div style="display:flex;gap:8px;">
        <select name="quantity" class="input" style="max-width:82px;" title="Cantidad (para productos contables)">
          <option value="-">–</option>
          <option>1x</option><option>2x</option><option>3x</option><option>4x</option><option>5x</option>
          <option>6x</option><option>7x</option><option>8x</option><option>9x</option><option>10x</option>
        </select>
        <input type="text" name="note" placeholder="Nota (p.ej. Compra SPAR)" class="input" style="flex:1;" list="note-list" autocomplete="off">
      </div>
      <div class="loc-row">
        <button type="button" class="btn-sm btn-track" onclick="captureLocation(this)">📍 Añadir ubicación</button>
        <span class="loc-status"></span>
      </div>
      <input type="hidden" name="latitude"><input type="hidden" name="longitude"><input type="hidden" name="place_name">
      <label class="file-label">📷 Adjuntar recibo <span class="file-name"></span>
        <input type="file" name="attachment" accept="image/*" capture="environment" style="display:none;" onchange="showFileName(this)">
      </label>
      <button type="submit" class="btn">Guardar gasto</button>
    </form>

    <!-- Ingreso -->
    <form id="form-income" class="add-form form-col" method="post" action="/add/income" style="display:none;">
      <select name="profile" class="input js-profile" data-kind="income" required></select>
      <div class="cascade" data-kind="income">
        <input type="hidden" name="category" data-role="category">
        <input type="hidden" name="subcategory" data-role="subcategory">
        <button type="button" class="input cascade-trigger" onclick="toggleCascade(this)">
          <span class="cascade-label" style="color:var(--muted);">Selecciona categoría</span><span class="cascade-caret">▾</span>
        </button>
        <div class="cascade-panel" style="display:none;"></div>
      </div>
      <input type="text" name="store" class="input js-store" placeholder="🏪 Tienda / origen (opcional)" list="store-list">
      <select name="account_id" class="input js-account" required></select>
      <input type="number" step="0.01" min="0" name="amount" placeholder="Importe (€)" class="input mono" required>
      <input type="date" name="date" class="input mono js-today" required>
      <input type="text" name="note" placeholder="Nota (opcional)" class="input" list="note-list" autocomplete="off">
      <button type="submit" class="btn">Guardar ingreso</button>
    </form>

    <!-- Transferencia -->
    <form id="form-transfer" class="add-form form-col" method="post" action="/add/transfer" style="display:none;">
      <select name="from_account_id" class="input js-account" required></select>
      <div class="transfer-arrow">↓</div>
      <select name="to_account_id" class="input js-account" required></select>
      <input type="number" step="0.01" min="0" name="amount" placeholder="Importe" class="input mono" required>
      <input type="date" name="date" class="input mono js-today" required>
      <input type="text" name="note" placeholder="Nota (opcional)" class="input">
      <button type="submit" class="btn">Transferir</button>
    </form>
    <datalist id="store-list"></datalist>
    <datalist id="note-list"></datalist>
  </div>
</div>
