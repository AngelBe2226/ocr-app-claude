<div style="margin-bottom:12px;"><a href="/reports" style="font-size:13px;color:var(--secondary);">← Reportes</a></div>
<div style="margin-bottom:16px;"><div class="page-title">{{ title }}</div>{% if subtitle %}<div class="page-subtitle">{{ subtitle }}</div>{% endif %}</div>
{% if kpis %}
<div class="grid-auto" style="margin-bottom:16px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));">
  {% for k in kpis %}
  <div class="card card-pad-18">
    <div style="font-size:12px;color:var(--secondary);margin-bottom:8px;">{{ k.label }}</div>
    <div class="mono" style="font-size:19px;font-weight:700;color:{{ k.color }};">{{ k.value }}</div>
  </div>
  {% endfor %}
</div>
{% endif %}
