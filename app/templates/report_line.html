{% extends "base.html" %}
{% block content %}
{% include "partials/_report_head.html" %}
<div class="card">
  <svg viewBox="0 0 600 165" style="width:100%;height:180px;overflow:visible;">
    {% if fill %}
    <polygon points="{{ chart.points }} 580,135 20,135" fill="{{ line_color }}" opacity="0.12"></polygon>
    {% endif %}
    <polyline points="{{ chart.points }}" fill="none" stroke="{{ line_color }}" stroke-width="3"
      stroke-linecap="round" stroke-linejoin="round" {% if dashed %}stroke-dasharray="7 5"{% endif %}></polyline>
    {% for d in chart.dots %}
    <circle cx="{{ d.x }}" cy="{{ d.y }}" r="3.5" fill="{{ line_color }}"></circle>
    <text x="{{ d.x }}" y="158" font-size="10" text-anchor="middle" fill="var(--secondary)">{{ d.label }}</text>
    {% endfor %}
  </svg>
</div>
{% endblock %}
