{% extends "base.html" %}
{% block content %}
{% include "partials/_report_head.html" %}
<div class="card">
  {% if rows %}
  <div style="display:flex;flex-direction:column;">
    {% for r in rows %}
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--border);">
      <span style="display:flex;align-items:center;gap:10px;min-width:0;">
        <span style="width:30px;height:30px;border-radius:50%;background:{{ r.color }}22;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:{{ r.color }};flex-shrink:0;">{{ r.name[0]|upper }}</span>
        <span style="font-size:13px;font-weight:600;">{{ r.name }}</span>
      </span>
      <span style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:11px;color:var(--secondary);">{{ r.count }} mov.</span>
        <span class="mono" style="font-size:13.5px;font-weight:700;">{{ r.amount }}</span>
      </span>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="empty-note">No hay movimientos.</div>
  {% endif %}
</div>
{% endblock %}
